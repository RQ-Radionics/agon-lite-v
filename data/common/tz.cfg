# /sdcard/tz.cfg — Timezone configuration
#
# POSIX format: STDoffset[DST[offset],start[/time],end[/time]]
#
#   STD       Standard time zone name (winter)
#   offset    Hours to subtract from local time to get UTC
#             (negative = east of Greenwich, positive = west)
#   DST       Daylight saving time zone name (summer)
#             Omit entirely if the region does not observe DST
#   ,start    When DST begins
#   ,end      When DST ends
#
#   Date format: Mm.w.d
#     M  = month (1-12)
#     w  = week within month (1-4, or 5 = last)
#     d  = day of week (0=Sunday, 6=Saturday)
#   /time     Local time at which the switch occurs (default 02:00)
#
# --- Examples ---
#
# UTC (no DST):
#   UTC0
#
# United Kingdom (GMT in winter, BST in summer):
#   GMT0BST,M3.5.0/1,M10.5.0
#   GMT0      = UTC+0 in winter
#   BST       = British Summer Time
#   M3.5.0/1  = last Sunday of March at 01:00
#   M10.5.0   = last Sunday of October at 02:00 (default)
#
# Madrid / Spain (CET in winter, CEST in summer):
#   CET-1CEST,M3.5.0,M10.5.0/3
#   CET       = Central European Time (winter, UTC+1)
#   -1        = subtract -1h from local time to get UTC (i.e. UTC+1)
#   CEST      = Central European Summer Time (summer, UTC+2)
#   M3.5.0    = last Sunday of March at 02:00 (default)
#   M10.5.0/3 = last Sunday of October at 03:00
#
# Note: the offset sign is inverted from the usual UTC+N convention.
# UTC+1 is written as -1, UTC+0 as 0, UTC-5 (New York) as 5.
CET-1CEST,M3.5.0,M10.5.0/3

